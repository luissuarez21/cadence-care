<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="1000" viewBox="0 0 1480 1000" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1480" height="1000" fill="#FBFBF9"/>

  <!-- Title -->
  <text x="56" y="68" font-size="40" font-weight="700" fill="#1A1A1A">Cadence</text>

  <!-- ============ ARROWS (drawn first, under nodes) ============ -->
  <g stroke="#374151" stroke-width="2.4" fill="none">
    <!-- frontends -> FastAPI -->
    <path d="M348,452 L468,476" marker-end="url(#arrow)"/>
    <path d="M348,562 L468,520" marker-end="url(#arrow)"/>
    <!-- FastAPI <-> Claude -->
    <path d="M652,490 L738,488" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <!-- Claude <-> Redis -->
    <path d="M1012,486 L1178,486" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <!-- Claude -> Arize -->
    <path d="M880,408 L912,234" marker-end="url(#arrow)"/>
    <!-- Claude -> Tools -->
    <path d="M878,562 L878,638" marker-end="url(#arrow)"/>
    <!-- Tools -> Redis -->
    <path d="M1162,724 C1250,724 1305,640 1305,564" marker-end="url(#arrow)"/>
    <!-- escalate chip -> Web Push -->
    <path d="M740,822 L674,748" marker-end="url(#arrow)"/>
    <!-- Web Push -> Clinician dashboard -->
    <path d="M480,700 L350,602" marker-end="url(#arrow)"/>
  </g>

  <!-- ============ FRONTEND ============ -->
  <text x="84" y="392" font-size="12" font-weight="700" letter-spacing="1.5" fill="#9CA3AF">FRONTEND · VERCEL</text>

  <!-- Patient PWA -->
  <rect x="84" y="410" width="264" height="85" rx="14" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#soft)"/>
  <rect x="102" y="431" width="44" height="44" rx="10" fill="#000000"/>
  <image href="vercel.png" x="106" y="435" width="36" height="36" preserveAspectRatio="xMidYMid meet"/>
  <text x="162" y="460" font-size="18" font-weight="700" fill="#1A1A1A">Patient PWA</text>

  <!-- Clinician Dashboard -->
  <rect x="84" y="520" width="264" height="85" rx="14" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#soft)"/>
  <rect x="102" y="541" width="44" height="44" rx="10" fill="#000000"/>
  <image href="vercel.png" x="106" y="545" width="36" height="36" preserveAspectRatio="xMidYMid meet"/>
  <text x="162" y="570" font-size="18" font-weight="700" fill="#1A1A1A">Clinician Dashboard</text>

  <!-- ============ BACKEND · RAILWAY (host label) ============ -->
  <text x="470" y="430" font-size="12" font-weight="700" letter-spacing="1.5" fill="#9CA3AF">BACKEND</text>
  <image href="railway.png" x="537" y="412" width="84" height="23" preserveAspectRatio="xMidYMid meet"/>

  <!-- ============ FastAPI ============ -->
  <rect x="470" y="440" width="182" height="110" rx="16" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#soft)"/>
  <image href="fastapi.png" x="490" y="455" width="128" height="46" preserveAspectRatio="xMidYMid meet"/>
  <text x="490" y="522" font-size="12.5" fill="#6B7280">API · auth · routes</text>
  <text x="490" y="540" font-size="12.5" fill="#6B7280">WebSocket /ws</text>

  <!-- ============ CLAUDE (hub) ============ -->
  <rect x="740" y="410" width="272" height="152" rx="20" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#soft)"/>
  <image href="claude.png" x="762" y="432" width="150" height="33" preserveAspectRatio="xMidYMid meet"/>
  <text x="762" y="494" font-size="12.5" fill="#6B7280">Anthropic · orchestrator (tool-use)</text>
  <text x="762" y="513" font-size="12.5" fill="#6B7280">Vision plan ingest · LLM-as-judge</text>
  <text x="762" y="535" font-size="12" fill="#9CA3AF" font-family="ui-monospace, Menlo, monospace">claude-sonnet-4-6</text>

  <!-- ============ ARIZE ============ -->
  <rect x="800" y="122" width="250" height="112" rx="16" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#soft)"/>
  <image href="arize.png" x="816" y="154" width="48" height="48" preserveAspectRatio="xMidYMid meet"/>
  <text x="878" y="162" font-size="22" font-weight="700" fill="#1A1A1A">Arize</text>
  <text x="878" y="186" font-size="12" fill="#6B7280">tracing on every agent call</text>
  <text x="878" y="204" font-size="12" fill="#6B7280">+ LLM-as-judge eval</text>

  <!-- ============ REDIS ============ -->
  <rect x="1180" y="410" width="250" height="152" rx="16" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#soft)"/>
  <image href="redis.png" x="1200" y="426" width="132" height="88" preserveAspectRatio="xMidYMid meet"/>
  <text x="1200" y="533" font-size="11.5" fill="#6B7280">memory · RAG vectors · symptoms</text>
  <text x="1200" y="551" font-size="11.5" fill="#6B7280">risk timeline · escalations · messages</text>

  <!-- ============ WEB PUSH ============ -->
  <rect x="470" y="700" width="200" height="96" rx="16" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#soft)"/>
  <rect x="488" y="726" width="44" height="44" rx="10" fill="#2563EB"/>
  <path d="M510 736 a11 11 0 0 1 11 11 v6 l3 4 h-28 l3 -4 v-6 a11 11 0 0 1 11 -11 z" fill="#FFFFFF"/>
  <circle cx="510" cy="762" r="3" fill="#FFFFFF"/>
  <text x="545" y="730" font-size="17" font-weight="700" fill="#1A1A1A">Web Push</text>
  <text x="545" y="751" font-size="12" fill="#6B7280">VAPID · zero-PHI</text>
  <text x="545" y="768" font-size="12" fill="#6B7280">escalation alert</text>

  <!-- ============ AGENT TOOLS ============ -->
  <rect x="720" y="640" width="440" height="320" rx="18" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="744" y="674" font-size="12" font-weight="700" letter-spacing="1.5" fill="#9CA3AF">7 AGENT TOOLS</text>

  <!-- col 1 -->
  <g>
    <rect x="742" y="690" width="196" height="44" rx="12" fill="#F3F4F6" stroke="#E5E7EB"/>
    <text x="758" y="717" font-size="13.5" fill="#374151" font-family="ui-monospace, Menlo, monospace">lookup_plan · RAG</text>
    <rect x="742" y="744" width="196" height="44" rx="12" fill="#F3F4F6" stroke="#E5E7EB"/>
    <text x="758" y="771" font-size="13.5" fill="#374151" font-family="ui-monospace, Menlo, monospace">assess_risk</text>
    <rect x="742" y="798" width="196" height="44" rx="12" fill="#FEF2F0" stroke="#F4C7BC"/>
    <text x="758" y="825" font-size="12.5" fill="#B4451F" font-family="ui-monospace, Menlo, monospace">escalate_to_clinician</text>
    <rect x="742" y="852" width="196" height="44" rx="12" fill="#F3F4F6" stroke="#E5E7EB"/>
    <text x="758" y="879" font-size="13.5" fill="#374151" font-family="ui-monospace, Menlo, monospace">schedule_followup</text>
  </g>
  <!-- col 2 -->
  <g>
    <rect x="948" y="690" width="196" height="44" rx="12" fill="#F3F4F6" stroke="#E5E7EB"/>
    <text x="964" y="717" font-size="13.5" fill="#374151" font-family="ui-monospace, Menlo, monospace">log_symptom</text>
    <rect x="948" y="744" width="196" height="44" rx="12" fill="#F3F4F6" stroke="#E5E7EB"/>
    <text x="964" y="771" font-size="13.5" fill="#374151" font-family="ui-monospace, Menlo, monospace">detect_pattern</text>
    <rect x="948" y="798" width="196" height="44" rx="12" fill="#F3F4F6" stroke="#E5E7EB"/>
    <text x="964" y="825" font-size="12" fill="#374151" font-family="ui-monospace, Menlo, monospace">generate_visit_summary</text>
  </g>
</svg>
